<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .card {
            background: #fff; border-radius: 16px; padding: 40px;
            text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            max-width: 360px; width: 90%;
        }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 20px; color: #1a1a1a; margin-bottom: 8px; }
        p { font-size: 14px; color: #666; margin-bottom: 24px; }
        a {
            display: inline-block; padding: 12px 32px;
            background: #c0392b; color: #fff; text-decoration: none;
            border-radius: 8px; font-weight: 600; font-size: 14px;
        }
        a:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">👋</div>
        <h1>You've been logged out</h1>
        <p>Your session has ended. Sign in again to continue.</p>
        <a href="/">Sign In</a>
    </div>
    <script>
        // Auto-redirect to login after 3 seconds
        setTimeout(function() { window.location.href = '/'; }, 3000);
    </script>
</body>
</html>
